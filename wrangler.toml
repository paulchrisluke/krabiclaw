name = "krabiclaw"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = ".output/public"

[triggers]
# Matches scheduledTasks in nuxt.config.ts
crons = ["*/5 * * * *", "*/10 * * * *", "0 3 * * *", "0 4 * * *", "0 * * * *"]

[[routes]]
pattern = "*.krabiclaw.com/*"
zone_name = "krabiclaw.com"

[[routes]]
pattern = "krabiclaw.com/*"
zone_name = "krabiclaw.com"

[[routes]]
pattern = "*/*"
zone_name = "krabiclaw.com"



[vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
# Internal cron/API endpoints use CRON_SECRET:
#   yarn wrangler secret put CRON_SECRET

[[d1_databases]]
binding = "DB"
database_name = "krabiclaw-db"
database_id = "0d0cd133-1914-48b1-b010-8fe574fede0c"
migrations_dir = "migrations"
remote = false

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media"
remote = false

[[kv_namespaces]]
binding = "SITE_CACHE"
id = "7fadf142e35745d6bec16b260eaab2f2"
remote = false

[ai]
binding = "AI"

# Preview environment — CI deploys here on every PR; Playwright smoke tests run
# against preview.krabiclaw.com. Dedicated resources isolated from staging/prod.
#
# Dedicated preview resources (created 2026-06-09):
#   krabiclaw-db-preview         D1   fba9d0aa-c6e2-411e-8cf5-ede43c15aae5
#   krabiclaw-media-preview      R2
#   krabiclaw-site-cache-preview KV   69252567b9cd4becbd486a337ab1e589
[env.preview]
workers_dev = true
preview_urls = true
routes = [
  { pattern = "preview.krabiclaw.com/*", zone_name = "krabiclaw.com" }
]

[env.preview.vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
BETTER_AUTH_URL = "https://preview.krabiclaw.com"
NUXT_PUBLIC_PLATFORM_DOMAIN = "https://preview.krabiclaw.com"
NUXT_PUBLIC_FREE_SITE_DOMAIN = "https://krabiclaw.com"
NUXT_PUBLIC_APP_NAME = "KrabiClaw"
EMAIL_DELIVERY_MODE = "log_only"
E2E_ALLOW_DEV_ROUTES = "true"
E2E_DEV_ROUTE_SECRET = "ci-dev-route-secret"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "krabiclaw-db-preview"
database_id = "fba9d0aa-c6e2-411e-8cf5-ede43c15aae5"
migrations_dir = "migrations"
remote = false

[[env.preview.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media-preview"
remote = false

[[env.preview.kv_namespaces]]
binding = "SITE_CACHE"
id = "69252567b9cd4becbd486a337ab1e589"
remote = false

[env.preview.ai]
binding = "AI"

# Stable staging environment — uses dedicated non-production data/resources and
# a fixed platform host for manual QA. Public tenant previews stay on workers.dev
# because nested hosts like demo.staging.krabiclaw.com are not covered by the
# zone's wildcard TLS certificate.
[env.staging]
routes = [
  { pattern = "staging.krabiclaw.com/*", zone_name = "krabiclaw.com" }
]

[env.staging.vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
BETTER_AUTH_URL = "https://staging.krabiclaw.com"
NUXT_PUBLIC_PLATFORM_DOMAIN = "https://staging.krabiclaw.com"
NUXT_PUBLIC_FREE_SITE_DOMAIN = "https://staging.krabiclaw.com"
NUXT_PUBLIC_APP_NAME = "KrabiClaw Staging"
EMAIL_DELIVERY_MODE = "log_only"
E2E_ALLOW_DEV_ROUTES = "true"
E2E_DEV_ROUTE_SECRET = "ci-dev-route-secret"
STRIPE_WEBHOOK_SECRET = "ci-stripe-webhook-secret-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "krabiclaw-db-staging"
database_id = "757824d5-bdb2-4041-81a7-c30b9d1dc960"
migrations_dir = "migrations"
remote = false

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media-staging"
remote = false

[[env.staging.kv_namespaces]]
binding = "SITE_CACHE"
id = "9e829557fd2b46dba4148f2ed27a5c0b"
remote = false

[env.staging.ai]
binding = "AI"
