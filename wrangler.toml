name = "kikuzuki-thailand-marketing"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "dist"

[vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
# Internal cron/API endpoints use CRON_SECRET:
#   yarn wrangler pages secret put CRON_SECRET

[[d1_databases]]
binding = "DB"
database_name = "thaiclaw-reviews"
database_id = "57cc9c44-1a23-41c3-8ec9-6b404c12ca2c"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media"

[ai]
binding = "AI"
