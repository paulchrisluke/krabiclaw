name = "kikuzuki-thailand-marketing"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = ".output/public"

[triggers]
# Matches scheduledTasks in nuxt.config.ts
crons = ["*/5 * * * *", "*/10 * * * *", "0 3 * * *", "0 4 * * *", "0 * * * *"]

[[routes]]
pattern = "*.krabiclaw.com/*"
zone_name = "krabiclaw.com"

[[routes]]
pattern = "krabiclaw.com/*"
zone_name = "krabiclaw.com"

[[routes]]
pattern = "*/*"
zone_name = "krabiclaw.com"



[vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
# Internal cron/API endpoints use CRON_SECRET:
#   yarn wrangler secret put CRON_SECRET

[[d1_databases]]
binding = "DB"
database_name = "krabiclaw-db"
database_id = "0d0cd133-1914-48b1-b010-8fe574fede0c"
migrations_dir = "migrations"
remote = false

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media"
remote = false

[[kv_namespaces]]
binding = "SITE_CACHE"
id = "7fadf142e35745d6bec16b260eaab2f2"
remote = false

[ai]
binding = "AI"

# Preview environment — used by CI to deploy a real edge Worker per PR and run
# Playwright against its live `workers.dev` preview URL (see ci.yml `e2e-smoke`
# and PLAYWRIGHT_PREVIEW_URL in playwright.config.ts), instead of emulating
# bindings locally via `yarn dev` + getPlatformProxy. Cloudflare's own guidance:
# real edge behavior in CI requires a deployed preview Worker, not a local proxy.
#
# Routes are intentionally omitted — preview Workers are reached via their
# `workers.dev` preview-alias URL, not custom domains/zones.
#
# Dedicated staging resources (created 2026-06-08, never pointed at production):
#   krabiclaw-db-staging      D1   757824d5-bdb2-4041-81a7-c30b9d1dc960
#   krabiclaw-media-staging   R2
#   krabiclaw-site-cache-staging  KV  9e829557fd2b46dba4148f2ed27a5c0b
[env.preview]
workers_dev = true
preview_urls = true
routes = []

[env.preview.vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "krabiclaw-db-staging"
database_id = "757824d5-bdb2-4041-81a7-c30b9d1dc960"
migrations_dir = "migrations"

[[env.preview.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media-staging"

[[env.preview.kv_namespaces]]
binding = "SITE_CACHE"
id = "9e829557fd2b46dba4148f2ed27a5c0b"

[env.preview.ai]
binding = "AI"
