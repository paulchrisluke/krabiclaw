name = "krabiclaw"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = ".output/public"

[triggers]
# Matches scheduledTasks in nuxt.config.ts
crons = ["*/5 * * * *", "*/10 * * * *", "0 1 * * *", "0 3 * * *", "0 4 * * *", "0 * * * *"]

[[routes]]
pattern = "*.krabiclaw.com/*"
zone_name = "krabiclaw.com"

[[routes]]
pattern = "krabiclaw.com/*"
zone_name = "krabiclaw.com"

[[routes]]
pattern = "*/*"
zone_name = "krabiclaw.com"



[vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
BETTER_AUTH_URL = "https://krabiclaw.com"
NUXT_PUBLIC_PLATFORM_DOMAIN = "https://krabiclaw.com"
NUXT_PUBLIC_FREE_SITE_DOMAIN = "https://krabiclaw.com"
NUXT_PUBLIC_APP_NAME = "KrabiClaw"
AI_SEARCH_NAMESPACE = "default"
AI_SEARCH_INSTANCE_ID = "krabiclaw-platform-knowledge"
GA4_MEASUREMENT_ID = "G-NJ1BSP9BYG"
# Production is the only environment that should send real email/WhatsApp — made explicit
# here rather than relying on getEmailDeliveryMode/getWhatsAppDeliveryMode's default, since
# that default now fails closed (log_only) precisely so a missing var elsewhere never sends real messages.
EMAIL_DELIVERY_MODE = "provider"
WHATSAPP_DELIVERY_MODE = "provider"
# Internal cron/API endpoints use CRON_SECRET:
#   yarn wrangler secret put CRON_SECRET
# GA4_API_SECRET (Measurement Protocol) is a secret, not a var:
#   yarn wrangler secret put GA4_API_SECRET
# PREVIEW_SECRET signs scoped preview/draft tokens (server/utils/preview-token.ts)
# and is required by the onboarding draft endpoints. It must stay stable across
# deploys/runs in a given environment — rotating it invalidates any draft preview
# tokens currently in flight (including from another overlapping CI run). preview
# and staging CI deploys sync it from the fixed PREVIEW_SECRET_PREVIEW /
# PREVIEW_SECRET_STAGING repo secrets on every run (see .github/workflows/ci.yml);
# production is set once manually and not touched by CI:
#   yarn wrangler secret put PREVIEW_SECRET
# EMAIL_REPLY_SECRET signs reply+<type>-<id>-<token>@reply.<platform-domain> addresses
# (server/utils/submission-messages.ts) so a customer's inbound reply can be matched back to the
# right reservation/contact/experience-booking thread without a DB lookup by address alone.
# EMAIL_INBOUND_SECRET authenticates the separate krabiclaw-email-inbound Worker
# (workers/email-inbound/) calling POST /api/email/inbound. Both must stay stable across
# deploys — rotating them invalidates reply-to addresses already sent out in guest emails.
# staging syncs from the fixed EMAIL_REPLY_SECRET_STAGING / EMAIL_INBOUND_SECRET_STAGING repo
# secrets on every run (see .github/workflows/ci.yml); production is set once manually and not
# touched by CI:
#   yarn wrangler secret put EMAIL_REPLY_SECRET
#   yarn wrangler secret put EMAIL_INBOUND_SECRET
# PLATFORM_SEARCH_REINDEX_SECRET protects POST /api/internal/search/reindex and is required for
# yarn ai-search:sync. Set it per environment:
#   yarn wrangler secret put PLATFORM_SEARCH_REINDEX_SECRET

[[d1_databases]]
binding = "DB"
database_name = "krabiclaw-db"
database_id = "0d0cd133-1914-48b1-b010-8fe574fede0c"
migrations_dir = "migrations"
remote = false

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media"
remote = false

[[kv_namespaces]]
binding = "SITE_CACHE"
id = "7fadf142e35745d6bec16b260eaab2f2"
remote = false

[ai]
binding = "AI"
remote = false

[[ai_search_namespaces]]
binding = "AI_SEARCH"
namespace = "default"
remote = true

[observability]
enabled = true

[observability.traces]
enabled = true

# Preview environment — CI deploys here on every PR; Playwright smoke tests run
# against preview.krabiclaw.com. Dedicated resources isolated from staging/prod.
#
# Dedicated preview resources (created 2026-06-09):
#   krabiclaw-db-preview         D1   fba9d0aa-c6e2-411e-8cf5-ede43c15aae5
#   krabiclaw-media-preview      R2
#   krabiclaw-site-cache-preview KV   69252567b9cd4becbd486a337ab1e589
[env.preview]
workers_dev = true
preview_urls = true
routes = [
  { pattern = "preview.krabiclaw.com/*", zone_name = "krabiclaw.com" }
]

[env.preview.vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
BETTER_AUTH_URL = "https://preview.krabiclaw.com"
NUXT_PUBLIC_PLATFORM_DOMAIN = "https://preview.krabiclaw.com"
NUXT_PUBLIC_FREE_SITE_DOMAIN = "https://krabiclaw.com"
NUXT_PUBLIC_APP_NAME = "KrabiClaw"
AI_SEARCH_NAMESPACE = "default"
AI_SEARCH_INSTANCE_ID = "krabiclaw-platform-knowledge-preview"
EMAIL_DELIVERY_MODE = "log_only"
WHATSAPP_DELIVERY_MODE = "log_only"
E2E_ALLOW_DEV_ROUTES = "true"
# E2E_DEV_ROUTE_SECRET is pushed via `wrangler secret put` in ci.yml, not a plaintext var here.

[[env.preview.d1_databases]]
binding = "DB"
database_name = "krabiclaw-db-preview"
database_id = "fba9d0aa-c6e2-411e-8cf5-ede43c15aae5"
migrations_dir = "migrations"
remote = false

[[env.preview.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media-preview"
remote = false

[[env.preview.kv_namespaces]]
binding = "SITE_CACHE"
id = "69252567b9cd4becbd486a337ab1e589"
remote = false

[env.preview.ai]
binding = "AI"
remote = false

[[env.preview.ai_search_namespaces]]
binding = "AI_SEARCH"
namespace = "default"
remote = true

[env.preview.observability]
enabled = false

# Stable staging environment — uses dedicated non-production data/resources and
# a fixed platform host for manual QA. NUXT_PUBLIC_FREE_SITE_DOMAIN is krabiclaw.com
# (same as preview) because *.staging.krabiclaw.com is not covered by the zone's
# wildcard TLS cert (Free plan, one level only). Tenant sites created from staging
# get *.krabiclaw.com URLs (production-style); E2E tests access them via x-preview-tenant.
[env.staging]
routes = [
  { pattern = "staging.krabiclaw.com/*", zone_name = "krabiclaw.com" }
]

[env.staging.vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
BETTER_AUTH_URL = "https://staging.krabiclaw.com"
NUXT_PUBLIC_PLATFORM_DOMAIN = "https://staging.krabiclaw.com"
NUXT_PUBLIC_FREE_SITE_DOMAIN = "https://krabiclaw.com"
NUXT_PUBLIC_APP_NAME = "KrabiClaw Staging"
AI_SEARCH_NAMESPACE = "default"
AI_SEARCH_INSTANCE_ID = "krabiclaw-platform-knowledge-staging"
EMAIL_DELIVERY_MODE = "log_only"
WHATSAPP_DELIVERY_MODE = "log_only"
E2E_ALLOW_DEV_ROUTES = "true"
# E2E_DEV_ROUTE_SECRET is pushed via `wrangler secret put` in ci.yml, not a plaintext var here.

[[env.staging.d1_databases]]
binding = "DB"
database_name = "krabiclaw-db-staging"
database_id = "757824d5-bdb2-4041-81a7-c30b9d1dc960"
migrations_dir = "migrations"
remote = false

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media-staging"
remote = false

[[env.staging.kv_namespaces]]
binding = "SITE_CACHE"
id = "9e829557fd2b46dba4148f2ed27a5c0b"
remote = false

[env.staging.ai]
binding = "AI"
remote = false

[[env.staging.ai_search_namespaces]]
binding = "AI_SEARCH"
namespace = "default"
remote = true

[env.staging.observability]
enabled = true

[env.staging.observability.traces]
enabled = true
