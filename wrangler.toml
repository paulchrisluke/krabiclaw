name = "kikuzuki-thailand-marketing"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "dist"

[vars]
CF_SAAS_CNAME_TARGET = "customers.krabiclaw.com"
# Cloudflare Stream — set CF_STREAM_API_TOKEN and CF_STREAM_CUSTOMER_SUBDOMAIN as secrets:
#   npx wrangler pages secret put CF_STREAM_API_TOKEN
#   npx wrangler pages secret put CF_STREAM_CUSTOMER_SUBDOMAIN
# CF_STREAM_CUSTOMER_SUBDOMAIN is the hash in your Stream delivery domain:
#   customer-{hash}.cloudflarestream.com  (find it in Stream dashboard → Overview)

[[d1_databases]]
binding = "REVIEWS_DB"
database_name = "thaiclaw-reviews"
database_id = "57cc9c44-1a23-41c3-8ec9-6b404c12ca2c"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "krabiclaw-media"

[ai]
binding = "AI"
