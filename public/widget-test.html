<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Dev Harness</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    .topbar { padding: 10px 16px; background: #1F2547; }
    .topbar-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .tool-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .tool-row:last-child { margin-bottom: 0; }
    .row-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; padding: 4px 0; margin-right: 4px; }
    .row-label.on  { color: #34d399; }
    .row-label.off { color: #475569; }
    .tab { padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.15s; line-height: 1.5; }
    .tab .badge { font-size: 9px; opacity: 0.65; margin-left: 3px; }
    .tab.on  { background: rgba(255,255,255,0.12); color: #cbd5e1; }
    .tab.on:hover  { background: rgba(255,255,255,0.2); color: #fff; }
    .tab.on.active { background: #fff; color: #1F2547; }
    .tab.on.active .badge { opacity: 0.45; }
    .tab.off { background: rgba(255,255,255,0.04); color: #475569; }
    .tab.off:hover { background: rgba(255,255,255,0.08); color: #64748b; }
    .tab.off.active { background: rgba(255,255,255,0.1); color: #64748b; }

    .content { display: grid; grid-template-columns: 1fr 300px; gap: 16px; padding: 16px; max-width: 900px; margin: 0 auto; }
    .preview-wrap { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    iframe { width: 100%; border: none; display: block; min-height: 400px; }

    .panel { display: flex; flex-direction: column; gap: 12px; }
    .panel-section { background: #1e293b; border-radius: 8px; padding: 12px; }
    .panel-section h2 { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .meta { font-size: 11px; color: #64748b; line-height: 1.7; margin-bottom: 8px; }
    .meta strong { color: #94a3b8; font-weight: 500; }
    .meta .pill { display: inline-block; padding: 1px 7px; border-radius: 9px; font-size: 10px; font-weight: 600; }
    .pill.on  { background: rgba(52,211,153,0.15); color: #34d399; }
    .pill.off { background: rgba(71,85,105,0.3);   color: #64748b; }
    textarea { width: 100%; height: 210px; font-family: 'Menlo', 'Monaco', monospace; font-size: 11px; padding: 8px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; resize: vertical; line-height: 1.6; }
    .apply-btn { width: 100%; padding: 8px; background: #1F2547; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .apply-btn:hover { background: #2d3a6b; }
    .log-list { list-style: none; max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
    .log-item { font-family: monospace; font-size: 11px; padding: 4px 8px; border-radius: 4px; background: #0f172a; border-left: 3px solid #334155; color: #94a3b8; word-break: break-all; line-height: 1.5; }
    .log-item.send  { border-left-color: #3b82f6; color: #93c5fd; }
    .log-item.tool  { border-left-color: #a855f7; color: #d8b4fe; }
    .log-item.state { border-left-color: #10b981; color: #6ee7b7; }
    .log-item.ext   { border-left-color: #f59e0b; color: #fcd34d; }
    .log-empty { font-size: 11px; color: #475569; text-align: center; padding: 10px 0; }
    .clear-btn { font-size: 11px; color: #475569; background: none; border: none; cursor: pointer; }
    .clear-btn:hover { color: #94a3b8; }
    .api-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .api-row input { font-size: 11px; padding: 3px 6px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; width: 220px; }
    .api-status { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 9px; }
    .api-status.live    { background: rgba(52,211,153,0.15); color: #34d399; }
    .api-status.offline { background: rgba(248,113,113,0.15); color: #f87171; }
    .stale-badge { font-size: 9px; color: #fcd34d; margin-left: 4px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Widget Harness</div>
  <div class="api-row">
    <span class="row-label off">Nuxt API</span>
    <input id="api-base" type="text" value="http://localhost:3000" />
    <button class="tab off" id="api-refresh" onclick="loadLiveConfig()">↺ Reload live config</button>
    <span class="api-status offline" id="api-status">checking…</span>
  </div>
  <div class="tool-row" id="row-enabled"></div>
  <div class="tool-row" id="row-disabled"></div>
</div>

<div class="content">
  <div class="preview-wrap">
    <iframe id="frame" title="Widget Preview"></iframe>
  </div>
  <div class="panel">
    <div class="panel-section">
      <h2>Tool</h2>
      <div class="meta" id="tool-meta"></div>
    </div>
    <div class="panel-section">
      <h2>toolOutput</h2>
      <textarea id="json"></textarea>
      <button class="apply-btn" onclick="applyJson()">↺ Apply</button>
    </div>
    <div class="panel-section">
      <h2>Actions <button class="clear-btn" onclick="clearLog()">clear</button></h2>
      <ul class="log-list" id="log"><li class="log-empty">No actions yet</li></ul>
    </div>
  </div>
</div>

<script>
// Shared placeholder image — swap for a real Cloudflare Images URL when testing specifics
const IMG = 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&fit=crop'

// Sample toolOutput payloads, keyed by MCP tool name. This is the ONLY thing this file
// hardcodes — which tools exist, which widget they use, and whether they're enabled is
// fetched live from /api/dev/widget-config (server/utils/mcp-widget-config.ts), the same
// source mcp.post.ts enforces in prod. Add a fixture here when you add a new widget tool;
// if a tool fires live with no fixture, it falls back to `{}` and gets flagged "no fixture".
// `widget` here is only used as an offline fallback (when /api/dev/widget-config can't be
// reached) — when live, the widgetName from MCP_TOOLS always wins. Widget-to-file naming is
// a stable convention, not the thing that drifted; `enabled` (deliberately absent here) was.
const FIXTURES = {
  list_sites: {
    widget: null, // welcome-list widget deleted — list_sites is text-only now
    fixture: {
      sites: [
        { id: 'site-pottery', name: 'Pottery House Krabi', subdomain: 'pottery-house', publicUrl: 'https://pottery-house.krabiclaw.com', status: 'live' },
        { id: 'site-demo',    name: 'Ember & Slice',       subdomain: 'demo',           publicUrl: 'https://demo.krabiclaw.com',           status: 'draft' },
      ],
      currentUser: { id: 'u1', email: 'paul@example.com', name: 'Paul', role: null, isPlatformAdmin: false },
    },
  },
  import_from_maps: {
    widget: null, // photo-album widget deleted — import_from_maps is text-only now
    fixture: {
      business: {
        name: 'Pottery House Krabi',
        address: '123 Beach Rd, Ao Nang, Krabi 81000',
        phone: '+66 75 123 456',
        hours: ['Mon–Sun 9:00–18:00'],
        rating: 4.8,
        reviewCount: 312,
        placeId: 'ChIJexample',
        mapsUrl: 'https://maps.google.com',
      },
      photos: [
        { assetId: 'ph1', publicUrl: 'https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?w=400&fit=crop' },
        { assetId: 'ph2', publicUrl: 'https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?w=400&fit=crop' },
        { assetId: 'ph3', publicUrl: 'https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?w=400&fit=crop' },
      ],
      missingPhotos: false,
    },
  },
  show_site_preview: {
    widget: null, // site-preview widget deleted — show_site_preview is text-only now
    fixture: {
      site: { id: 'site-pottery', name: 'Pottery House Krabi', subdomain: 'pottery-house', publicUrl: 'https://pottery-house.krabiclaw.com' },
      pages: [
        { label: 'Home', path: '/' },
        { label: 'About', path: '/about' },
        { label: 'Experiences', path: '/experiences' },
      ],
      ogImageUrl: null,
    },
  },
  show_generated_images: {
    widget: null, // image-carousel widget deleted — show_generated_images is text-only now
    fixture: {
      title: 'Homepage Hero',
      subtitle: 'Tap to use — or ask ChatGPT to generate another.',
      images: [{ assetId: 'img-native-1', publicUrl: IMG }],
      useLabel: 'Use as homepage hero',
      target: 'home_hero',
      site_id: 'site-demo',
    },
  },
  request_photo_upload: {
    widget: 'photo-upload',
    fixture: {
      asset_id: 'asset-123',
      upload_url: 'https://upload.imagedelivery.net/Frxyb2_d_vGyiaXhS5xqCg/00000000-0000-0000-0000-000000000000',
      site_id: 'site-pottery',
    },
  },
}

let TOOLS = []
let current = null

function apiBase() {
  return document.getElementById('api-base').value.trim().replace(/\/$/, '')
}

async function loadLiveConfig() {
  const statusEl = document.getElementById('api-status')
  statusEl.textContent = 'checking…'
  statusEl.className = 'api-status offline'
  try {
    const res = await fetch(apiBase() + '/api/dev/widget-config')
    if (!res.ok) throw new Error('HTTP ' + res.status)
    const config = await res.json()
    statusEl.textContent = 'live (widgetsEnabled=' + config.widgetsEnabled + ')'
    statusEl.className = 'api-status live'
    TOOLS = config.tools.map((t) => ({
      name: t.name,
      widget: t.widgetName,
      enabled: t.enabled,
      hasFixture: Object.prototype.hasOwnProperty.call(FIXTURES, t.name),
      fixture: FIXTURES[t.name]?.fixture ?? {},
    }))
    buildTabs()
    if (TOOLS.length) pick(TOOLS.find((t) => t.name === current?.name) || TOOLS[0])
  } catch (err) {
    statusEl.textContent = 'offline: ' + err.message
    statusEl.className = 'api-status offline'
    log('ext', 'Could not reach ' + apiBase() + '/api/dev/widget-config — run `yarn dev` and reload. Falling back to fixture-only list (enabled/disabled split unknown).')
    // Fallback so the harness is still usable with the Nuxt server down — but every tab
    // is marked unknown rather than guessing, since that's the whole point of this rewrite.
    TOOLS = Object.keys(FIXTURES).map((name) => ({ name, widget: FIXTURES[name].widget, enabled: null, hasFixture: true, fixture: FIXTURES[name].fixture }))
    buildTabs()
    if (TOOLS.length) pick(TOOLS[0])
  }
}

function buildTabs() {
  const enabledRow  = document.getElementById('row-enabled')
  const disabledRow = document.getElementById('row-disabled')
  enabledRow.innerHTML = ''
  disabledRow.innerHTML = ''

  const onLabel  = document.createElement('span')
  onLabel.className = 'row-label on'
  onLabel.textContent = '● Enabled'
  enabledRow.appendChild(onLabel)

  const offLabel = document.createElement('span')
  offLabel.className = 'row-label off'
  offLabel.textContent = '○ Disabled / Unknown'
  disabledRow.appendChild(offLabel)

  TOOLS.forEach((tool) => {
    const btn = document.createElement('button')
    btn.className = 'tab ' + (tool.enabled ? 'on' : 'off')
    btn.dataset.name = tool.name
    
    btn.textContent = tool.name
    const badge = document.createElement('span')
    badge.className = 'badge'
    badge.textContent = tool.widget || '?'
    btn.appendChild(badge)
    
    if (!tool.hasFixture) {
      const staleBadge = document.createElement('span')
      staleBadge.className = 'stale-badge'
      staleBadge.textContent = 'no fixture'
      btn.appendChild(staleBadge)
    }

    btn.onclick = () => pick(tool)
    ;(tool.enabled ? enabledRow : disabledRow).appendChild(btn)
  })
}

function setActive(tool) {
  document.querySelectorAll('.tab').forEach((t) => {
    t.classList.toggle('active', t.dataset.name === tool.name)
  })
}

function updateMeta(tool) {
  const el = document.getElementById('tool-meta')
  const statusLabel = tool.enabled === null ? 'unknown (offline)' : tool.enabled ? 'enabled' : 'disabled'
  const statusPill = tool.enabled === null ? 'off' : tool.enabled ? 'on' : 'off'
  
  el.innerHTML = ''
  
  const strTool = document.createElement('strong')
  strTool.textContent = 'tool'
  el.appendChild(strTool)
  el.appendChild(document.createTextNode(' ' + tool.name))
  el.appendChild(document.createElement('br'))
  
  const strWidget = document.createElement('strong')
  strWidget.textContent = 'widget'
  el.appendChild(strWidget)
  el.appendChild(document.createTextNode(' ' + (tool.widget || '(unknown — server offline)')))
  el.appendChild(document.createElement('br'))
  
  const strStatus = document.createElement('strong')
  strStatus.textContent = 'status'
  el.appendChild(strStatus)
  el.appendChild(document.createTextNode(' '))
  const spanPill = document.createElement('span')
  spanPill.className = 'pill ' + statusPill
  spanPill.textContent = statusLabel
  el.appendChild(spanPill)
  
  if (!tool.hasFixture) {
    el.appendChild(document.createElement('br'))
    const strFixture = document.createElement('strong')
    strFixture.textContent = 'fixture'
    el.appendChild(strFixture)
    el.appendChild(document.createTextNode(' none — add one to FIXTURES in widget-test.html'))
  }
}

function pick(tool) {
  current = tool
  setActive(tool)
  updateMeta(tool)
  document.getElementById('json').value = JSON.stringify(tool.fixture, null, 2)
  render(tool.widget, tool.fixture)
}

function applyJson() {
  try { render(current.widget, JSON.parse(document.getElementById('json').value)) }
  catch (e) { alert('Invalid JSON: ' + e.message) }
}

function render(widget, data) {
  if (!widget) {
    document.getElementById('frame').srcdoc = '<body style="font:12px monospace;color:#94a3b8;padding:16px">No widget name — reload live config.</body>'
    return
  }
  document.getElementById('frame').srcdoc = `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script>
window.openai={
  toolOutput:${JSON.stringify(data)},
  toolInput:${JSON.stringify(data)},
  setWidgetState:function(s){parent.postMessage({t:'state',d:s},'*')},
  sendFollowUpMessage:function(m){parent.postMessage({t:'send',d:m},'*')},
  callTool:function(n,a){parent.postMessage({t:'tool',n:n,a:a},'*')},
  openExternal:function(a){parent.postMessage({t:'ext',u:a?.href||a},'*')},
}
<\/script>
<style>:root{color-scheme:light dark;}</style>
<script type="module" src="./mcp-assets/${widget}.js"><\/script>
</head><body style="margin:0"><div id="app"></div></body></html>`
}

function log(cls, text) {
  const ul = document.getElementById('log')
  const empty = ul.querySelector('.log-empty')
  if (empty) empty.remove()
  const li = document.createElement('li')
  li.className = 'log-item ' + cls
  li.textContent = text
  ul.prepend(li)
}

function clearLog() {
  document.getElementById('log').innerHTML = '<li class="log-empty">No actions yet</li>'
}

window.addEventListener('message', (e) => {
  const d = e.data
  if (!d?.t) return
  if (d.t === 'send')  log('send',  'sendFollowUpMessage → "' + d.d?.prompt + '"')
  if (d.t === 'tool')  log('tool',  'callTool → ' + d.n + '(' + JSON.stringify(d.a) + ')')
  if (d.t === 'state') log('state', 'setWidgetState → ' + JSON.stringify(d.d))
  if (d.t === 'ext')   log('ext',   'openExternal → ' + d.u)
})

loadLiveConfig()
</script>
</body>
</html>
