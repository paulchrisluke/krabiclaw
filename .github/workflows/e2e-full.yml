name: E2E full regression

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-full-regression
  cancel-in-progress: true

jobs:
  provider-status:
    name: Production provider status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: staging
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run read-only provider checks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CANARY_BASE_URL: ${{ secrets.CANARY_BASE_URL }}
          CANARY_SITE_ID: ${{ secrets.CANARY_SITE_ID }}
          CANARY_ORG_ID: ${{ secrets.CANARY_ORG_ID }}
          CANARY_STATUS_SECRET: ${{ secrets.CANARY_STATUS_SECRET }}
        run: yarn canary:status | tee canary-status.log
      - name: Upload provider status log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: provider-status-log
          path: canary-status.log
          if-no-files-found: ignore

  full-regression:
    name: Full browser and client regression
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
      NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      BETTER_AUTH_SECRET: test-secret-for-ci
      BETTER_AUTH_URL: https://staging.krabiclaw.com
      E2E_ALLOW_DEV_ROUTES: "true"
      E2E_DEV_ROUTE_SECRET: ${{ secrets.E2E_DEV_ROUTE_SECRET_STAGING }}
      PLAYWRIGHT_PREVIEW_URL: https://staging.krabiclaw.com
      PLAYWRIGHT_WORKERS: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: staging
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Seed exhaustive client fixture not used by required staging smoke
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/generate-ncls-blawby-seed.mjs --staging
      - name: Run full Playwright regression
        run: yarn test:e2e:full
      - name: Verify client fixtures
        run: |
          yarn fixture:pottery-house --url https://staging.krabiclaw.com --site-id site-pottery-house --slug pottery-house
          node scripts/client-verify.mjs --url https://staging.krabiclaw.com --vertical professional_service --site-id site-ncls-blawby --slug north-carolina-legal-services --tenant-slug ncls
          yarn client:verify:ncls-seo --url https://staging.krabiclaw.com --expected-origin https://staging.krabiclaw.com --tenant-slug ncls
      - name: Write regression summary
        if: always()
        run: |
          echo "## Full E2E regression" >> "$GITHUB_STEP_SUMMARY"
          echo "Target: https://staging.krabiclaw.com" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report-full
          path: |
            playwright-report/
            test-results/
          retention-days: 14
