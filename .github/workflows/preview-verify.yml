name: Preview Verify

# Trigger manually after a preview deploy (Cloudflare Workers preview URLs are
# not automatically known at PR time — run this after wrangler deploy --env preview).
on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: Preview site URL (e.g. https://pottery-house-krabi.krabiclaw.com)
        required: true
      vertical:
        description: 'Site vertical (restaurant | experience | retail | wellness | service)'
        required: true
        default: restaurant
      site_id:
        description: Site ID (e.g. site-pottery-house-krabi)
        required: true
      slug:
        description: Client slug (e.g. pottery-house-krabi) — used for report output
        required: false

jobs:
  verify:
    name: Smoke-test preview site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run client:verify
        env:
          PREVIEW_URL: ${{ inputs.preview_url }}
          VERTICAL: ${{ inputs.vertical }}
          SITE_ID: ${{ inputs.site_id }}
          SLUG: ${{ inputs.slug }}
        run: |
          ARGS=("--url" "$PREVIEW_URL" "--vertical" "$VERTICAL" "--site-id" "$SITE_ID")
          if [ -n "$SLUG" ]; then ARGS+=("--slug" "$SLUG"); fi
          node scripts/client-verify.mjs "${ARGS[@]}"
      - name: Upload verify report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: verify-report-${{ inputs.slug || 'site' }}
          path: client-imports/${{ inputs.slug || 'site' }}/verify-report.*
          if-no-files-found: ignore
