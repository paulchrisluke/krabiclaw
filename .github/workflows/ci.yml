name: CI

on:
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, staging]

permissions:
  contents: read

# Group by PR number so a new push cancels that PR's stale in-progress run —
# runners were queueing up behind old commits' runs, starving the current
# commit's run of hosted runners. Push events (main/staging, which deploy)
# group by commit sha instead, which never collides with another run, so a
# deploy in progress is never auto-cancelled by this.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    name: Type check
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint:better-auth-boundaries
      - run: yarn typecheck
      - run: yarn test:unit
      - run: yarn mcp:compat

  changes:
    name: Detect changed paths
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pottery_house: ${{ steps.filter.outputs.pottery_house }}
      blawby: ${{ steps.filter.outputs.blawby }}
      seed_relevant: ${{ steps.filter.outputs.seed_relevant }}
      auth: ${{ steps.filter.outputs.auth }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      billing: ${{ steps.filter.outputs.billing }}
      notifications: ${{ steps.filter.outputs.notifications }}
      mcp: ${{ steps.filter.outputs.mcp }}
      seo: ${{ steps.filter.outputs.seo }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            pottery_house:
              - 'scripts/**'
              - '!scripts/*blawby*.mjs'
              - '!scripts/adapters/ncls-blawby.mjs'
              - 'components/saya/**'
              - 'pages/**'
              - 'utils/vertical-copy.ts'
            blawby:
              - 'client-imports/north-carolina-legal-services/**'
              - 'components/blawby/**'
              - 'composables/useBlawby**'
              - 'layouts/blawby.vue'
              - 'migrations/**'
              - 'pages/about.vue'
              - 'pages/article/**'
              - 'pages/blog/**'
              - 'pages/contact/**'
              - 'pages/donate.vue'
              - 'pages/policies/**'
              - 'pages/pricing.vue'
              - 'pages/schedule.vue'
              - 'pages/services/**'
              - 'pages/third-party-notices.vue'
              - 'scripts/*blawby*.mjs'
              - 'scripts/adapters/ncls-blawby.mjs'
              - 'scripts/client-verify.mjs'
              - 'scripts/verify-ncls-seo-migration.mjs'
              - 'scripts/utils/seo-migration-contract.mjs'
              - 'server/api/editor/sites/**/professional-services*'
              - 'server/api/editor/sites/**/qa/**'
              - 'server/api/editor/sites/**/qa.*'
              - 'server/api/editor/sites/**/reviews/**'
              - 'server/api/editor/sites/**/reviews.*'
              - 'server/api/public/sites/**/blawby.get.ts'
              - 'server/api/public/sites/**/blawby/**'
              - 'server/api/public/sites/**/contact.post.ts'
              - 'server/api/public/sites/**/conversion-events.post.ts'
              - 'server/db/schema.ts'
              - 'server/middleware/zz-redirects.ts'
              - 'server/plugins/tenant-sitemap-filter.ts'
              - 'server/utils/professional-services*.ts'
              - 'server/utils/location-qa.ts'
              - 'server/utils/site-reviews.ts'
              - 'server/utils/platform-content.ts'
              - 'server/utils/mcp-executor/qa.ts'
              - 'server/utils/mcp-executor/reviews.ts'
              - 'server/utils/mcp-workflows.ts'
              - 'types/blawby.ts'
              - 'utils/template-registry.ts'
              - 'utils/blawby-pricing.ts'
              - 'tests/e2e/blawby.spec.ts'
              - 'tests/e2e/site-content-scopes.spec.ts'
              - 'tests/unit/blawby*.test.ts'
              - 'tests/unit/ncls-seo-migration.test.ts'
              - 'tests/unit/site-content-scopes.test.ts'
            seed_relevant:
              - 'scripts/**'
              - 'seed-definitions/**'
              - 'server/db/schema.ts'
              - 'migrations/**'
            auth:
              - 'server/api/auth/**'
              - 'server/utils/auth*'
              - 'pages/auth/**'
              - 'middleware/auth*'
              - 'tests/e2e/auth.spec.ts'
              - 'tests/e2e/oauth-discovery.spec.ts'
            dashboard:
              - 'components/dashboard/**'
              - 'pages/dashboard/**'
              - 'server/api/dashboard/**'
              - 'server/api/editor/**'
              - 'tests/e2e/dashboard*.spec.ts'
            billing:
              - 'server/api/billing/**'
              - 'server/utils/billing*'
              - 'server/utils/stripe*'
              - 'pages/dashboard/**/billing.vue'
              - 'tests/e2e/billing*.spec.ts'
            notifications:
              - 'server/utils/notifications.ts'
              - 'server/utils/whatsapp.ts'
              - 'server/emails/**'
              - 'server/api/**/contact*'
              - 'server/api/**/reservations/**'
              - 'tests/e2e/notifications.spec.ts'
            mcp:
              - '.github/workflows/ci.yml'
              - 'build/cloudflare-dev-module.ts'
              - 'build/runtime/cloudflare-bindings-dev.ts'
              - 'docs/local-mcp-harness.md'
              - 'docs/media-workflow-contract.md'
              - 'migrations/**'
              - 'nuxt.config.ts'
              - 'package.json'
              - 'pages/oauth/login.vue'
              - 'playwright.config.ts'
              - 'scripts/check-*mcp*.mjs'
              - 'scripts/demo-recording/**'
              - 'scripts/test-mcp-local-tunnel.mjs'
              - 'server/api/auth/**'
              - 'server/api/dev/mcp-telemetry.get.ts'
              - 'server/api/mcp-test/tiny-video.get.ts'
              - 'server/api/mcp.post.ts'
              - 'server/db/schema.ts'
              - 'server/middleware/00.r2-media.ts'
              - 'server/middleware/dev-connector-logging.ts'
              - 'server/utils/auth.ts'
              - 'server/utils/mcp*/**'
              - 'server/utils/mcp*'
              - 'tests/e2e/mcp-*.spec.ts'
              - 'tests/e2e/helpers/mcp.ts'
              - 'tests/e2e/oauth-discovery.spec.ts'
              - 'types/nitro.d.ts'
              - 'vite.config.widgets.ts'
              - 'widgets/**'
              - 'wrangler.toml'
            seo:
              - 'app.vue'
              - 'layouts/**'
              - 'server/plugins/tenant-sitemap-filter.ts'
              - 'server/routes/**'
              - 'utils/seo*'
              - 'tests/e2e/seo.spec.ts'

  guardrails:
    name: CI guardrails
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - name: Run Node-only guardrails
        run: |
          node scripts/check-better-auth-boundaries.mjs
          node scripts/lint-seeds.mjs
          node scripts/lint-migrations.mjs
          node scripts/lint-tool-parity.mjs

      - name: Check pipeline scripts
        run: |
          for f in \
            scripts/client-import.mjs \
            scripts/client-verify.mjs \
            scripts/client-onboard.mjs \
            scripts/client-override.mjs \
            scripts/client-deploy.mjs \
            scripts/canary-prod.mjs \
            scripts/canary-notifications.mjs \
            scripts/generate-ncls-blawby-seed.mjs \
            scripts/prepare-ncls-blawby-media.mjs \
            scripts/capture-blawby-screenshots.mjs \
            scripts/compare-blawby-screenshots.mjs \
            scripts/rollback-prod.mjs \
            scripts/verify-blawby-site.mjs \
            scripts/verify-ncls-seo-migration.mjs \
            scripts/lint-seeds.mjs \
            scripts/lint-migrations.mjs \
            scripts/lint-tool-parity.mjs \
            scripts/fixtures/pottery-house-krabi.fixture.mjs; do
            node --check "$f" && echo "✓ $f" || exit 1
          done

  e2e-smoke:
    name: E2E smoke
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false
    needs: [changes]
    runs-on: ubuntu-latest
    concurrency:
      group: shared-preview-deployment
      cancel-in-progress: false
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
      NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NUXT_PUBLIC_PLATFORM_DOMAIN: https://preview.krabiclaw.com
      NUXT_PUBLIC_FREE_SITE_DOMAIN: https://preview.krabiclaw.com
      NUXT_PUBLIC_APP_NAME: KrabiClaw

      BETTER_AUTH_SECRET: test-secret-for-ci
      BETTER_AUTH_URL: https://preview.krabiclaw.com
      E2E_ALLOW_DEV_ROUTES: "true"
      E2E_DEV_ROUTE_SECRET: ${{ secrets.E2E_DEV_ROUTE_SECRET_PREVIEW }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Build application
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: yarn build
      - name: Migrate preview database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: yarn migrate:preview
      - name: Sweep E2E artifacts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Runs as its own wrangler d1 execute call, separate from the fixture reseed below - was
        # previously concatenated into one combined file with the 3 seed scripts and executed as a
        # single call with no retry logic (execWithRetry only applies inside this script's own
        # self-executing mode, not a raw `wrangler d1 execute --file` in a workflow step), sharing
        # one CPU budget across everything. That's the exact problem e2e-staging already avoided
        # by running each script separately - confirmed as a real, reproducing failure here too
        # ("D1 DB exceeded its CPU time limit and was reset", no retry, single attempt).
        run: node --experimental-strip-types scripts/reset-e2e-artifacts.ts --preview
      - name: Seed preview fixtures
        if: needs.changes.outputs.seed_relevant == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Skipped entirely on PRs touching neither seed data nor schema - DELETE-then-INSERT of
        # demo/Pottery House/Kikuzuki is idempotent but wasted work otherwise.
        run: |
          node --experimental-strip-types scripts/generate-demo-bundle.ts
          node --experimental-strip-types scripts/generate-demo-seed.ts --preview --stdout > /tmp/preview-seed.sql
          node --experimental-strip-types scripts/generate-pottery-house-seed.ts --preview --stdout >> /tmp/preview-seed.sql
          node --experimental-strip-types scripts/generate-kikuzuki-seed.ts --preview --stdout >> /tmp/preview-seed.sql
          npx wrangler d1 execute DB --env preview --remote --file /tmp/preview-seed.sql
      - name: Seed NCLS/Blawby fixture
        if: needs.changes.outputs.blawby == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/generate-ncls-blawby-seed.mjs --preview
      - name: Deploy preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: yarn deploy:preview:worker
      - name: Sync preview secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_SECRET_PREVIEW: ${{ secrets.PREVIEW_SECRET_PREVIEW }}
        # Preview is shared across concurrent/overlapping PR runs, so the secret must stay
        # stable across runs — regenerating it per run would invalidate draft preview
        # tokens issued by another run still in flight. Sourced from a fixed repo secret.
        run: |
          printf '%s' "$PREVIEW_SECRET_PREVIEW" | npx wrangler secret put PREVIEW_SECRET --env preview
      - name: Sync preview dev-route secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          E2E_DEV_ROUTE_SECRET_PREVIEW: ${{ secrets.E2E_DEV_ROUTE_SECRET_PREVIEW }}
        # Gates server/api/dev/* (see server/utils/dev-route-auth.ts) — must match the
        # header this job's own curl/Playwright calls send, so keep this in sync with
        # the E2E_DEV_ROUTE_SECRET env var above.
        run: |
          printf '%s' "$E2E_DEV_ROUTE_SECRET_PREVIEW" | npx wrangler secret put E2E_DEV_ROUTE_SECRET --env preview
      - name: Sync preview email reply secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EMAIL_REPLY_SECRET_PREVIEW: ${{ secrets.EMAIL_REPLY_SECRET_PREVIEW }}
          EMAIL_INBOUND_SECRET_PREVIEW: ${{ secrets.EMAIL_INBOUND_SECRET_PREVIEW }}
        # Signs/verifies reply+<type>-<id>-<token>@reply.preview.krabiclaw.com addresses (see
        # server/utils/submission-messages.ts). Must stay stable across runs — rotating it would
        # invalidate reply-to addresses already sent out in guest emails from a prior run.
        run: |
          printf '%s' "$EMAIL_REPLY_SECRET_PREVIEW" | npx wrangler secret put EMAIL_REPLY_SECRET --env preview
          printf '%s' "$EMAIL_INBOUND_SECRET_PREVIEW" | npx wrangler secret put EMAIL_INBOUND_SECRET --env preview
      - run: npx playwright install --with-deps chromium
      - name: Warm up preview Worker and verify asset propagation
        run: |
          CURL_TIMEOUT=(--connect-timeout 5 --max-time 15)
          curl -sf "${CURL_TIMEOUT[@]}" -o /dev/null "https://preview.krabiclaw.com/" || true
          curl -sf "${CURL_TIMEOUT[@]}" -o /dev/null "https://preview.krabiclaw.com/blog" || true
          curl -sf "${CURL_TIMEOUT[@]}" -L -H "x-dev-route-secret: ${E2E_DEV_ROUTE_SECRET}" -o /dev/null "https://preview.krabiclaw.com/api/dev/login" || true

          # Cloudflare propagates a new Worker+Assets deploy to edge PoPs over a few
          # seconds, not instantly. A request landing on a not-yet-updated PoP right
          # after deploy can serve this build's HTML (correct new asset hashes) while
          # the actual asset request lands on a different, still-stale PoP (or vice
          # versa) — producing a 404 with the wrong MIME type mid-test. A blind sleep
          # doesn't confirm propagation actually finished, so poll the Nuxt assets
          # referenced by the same tenant routes smoke opens.
          propagated=false
          stable_checks=0
          for i in $(seq 1 30); do
            asset_paths=""
            for route in "/" "/locations/brooklyn"; do
              tenant_html=$(curl -sf "${CURL_TIMEOUT[@]}" \
                -H "x-preview-tenant: demo" \
                -H "cache-control: no-store" \
                "https://preview.krabiclaw.com${route}?e2e=asset-probe-$i" || true)
              route_assets=$(printf '%s' "$tenant_html" | grep -oE '/_nuxt/[^"'"'"') >]+[.](css|js)' || true)
              asset_paths="${asset_paths}"$'\n'"${route_assets}"
            done

            asset_failures=""
            while IFS= read -r asset_path; do
              [ -n "$asset_path" ] || continue
              asset_result=$(curl -sI "${CURL_TIMEOUT[@]}" -o /dev/null -w "%{http_code} %{content_type}" \
                -H "x-preview-tenant: demo" \
                -H "cache-control: no-store" \
                "https://preview.krabiclaw.com${asset_path}" || true)
              case "$asset_path:$asset_result" in
                *.css:200\ text/css*|*.js:200\ *javascript*) ;;
                *) asset_failures="${asset_failures}"$'\n'"${asset_path} -> ${asset_result:-no response}" ;;
              esac
            done < <(printf '%s\n' "$asset_paths" | sort -u)

            if [ -n "$(printf '%s' "$asset_paths" | tr -d '[:space:]')" ] && [ -z "$asset_failures" ]; then
              stable_checks=$((stable_checks + 1))
              echo "Tenant route Nuxt assets are live (stable check $stable_checks/3, attempt $i)"
              if [ "$stable_checks" -ge 3 ]; then
                propagated=true
                break
              fi
            else
              stable_checks=0
              echo "Tenant route Nuxt assets are not stable yet:${asset_failures:- no assets found} (attempt $i)"
            fi
            sleep 2
          done
          if [ "$propagated" = false ]; then
            echo "::error::Preview tenant route Nuxt assets did not return valid content for three consecutive checks."
            exit 1
          fi
      - name: Run smoke tests
        env:
          PLAYWRIGHT_PREVIEW_URL: https://preview.krabiclaw.com
          POTTERY_HOUSE_CHANGED: ${{ needs.changes.outputs.pottery_house }}
          BLAWBY_CHANGED: ${{ needs.changes.outputs.blawby }}
          MCP_CHANGED: ${{ needs.changes.outputs.mcp }}
        run: |
          yarn test:e2e:smoke
          [ "$MCP_CHANGED" != "true" ] || PLAYWRIGHT_WORKERS=1 yarn test:e2e:mcp
          if [ "$POTTERY_HOUSE_CHANGED" = "true" ]; then
            yarn test:e2e:pottery-house
          fi
          if [ "$BLAWBY_CHANGED" = "true" ]; then
            yarn test:e2e:blawby
          fi
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report-preview
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-staging:
    name: E2E staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [changes]
    runs-on: ubuntu-latest
    # Every staging run migrates, resets, and reseeds the same remote D1 database.
    # Queue pushes so fixture writes and deployment smoke tests cannot overlap.
    concurrency:
      group: shared-staging-deployment
      cancel-in-progress: false
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
      NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NUXT_PUBLIC_PLATFORM_DOMAIN: https://staging.krabiclaw.com
      NUXT_PUBLIC_FREE_SITE_DOMAIN: https://staging.krabiclaw.com
      NUXT_PUBLIC_APP_NAME: KrabiClaw

      BETTER_AUTH_SECRET: test-secret-for-ci
      BETTER_AUTH_URL: https://staging.krabiclaw.com
      E2E_ALLOW_DEV_ROUTES: "true"
      E2E_DEV_ROUTE_SECRET: ${{ secrets.E2E_DEV_ROUTE_SECRET_STAGING }}
      PLAYWRIGHT_PREVIEW_URL: https://staging.krabiclaw.com
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Build application
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: yarn build
      - name: Migrate + seed staging database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          yarn migrate:staging
          node --experimental-strip-types scripts/generate-demo-bundle.ts
          node --experimental-strip-types scripts/reset-e2e-artifacts.ts --staging
          node --experimental-strip-types scripts/generate-demo-seed.ts --staging
          node --experimental-strip-types scripts/generate-pottery-house-seed.ts --staging
          node --experimental-strip-types scripts/generate-kikuzuki-seed.ts --staging
      - name: Seed NCLS/Blawby staging fixture
        if: needs.changes.outputs.blawby == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/generate-ncls-blawby-seed.mjs --staging
      - name: Deploy staging Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: yarn deploy:staging:worker
      - name: Sync staging Stripe secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRIPE_SECRET_KEY_TEST: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          STRIPE_WEBHOOK_SECRET_STAGING: ${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
        run: |
          echo "$STRIPE_SECRET_KEY_TEST" | npx wrangler secret put STRIPE_SECRET_KEY --env staging
          echo "$STRIPE_WEBHOOK_SECRET_STAGING" | npx wrangler secret put STRIPE_WEBHOOK_SECRET --env staging
      - name: Sync staging email reply secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EMAIL_REPLY_SECRET_STAGING: ${{ secrets.EMAIL_REPLY_SECRET_STAGING }}
          EMAIL_INBOUND_SECRET_STAGING: ${{ secrets.EMAIL_INBOUND_SECRET_STAGING }}
        # Signs/verifies reply+<type>-<id>-<token>@reply.staging.krabiclaw.com addresses (see
        # server/utils/submission-messages.ts). Must stay stable across runs — rotating it would
        # invalidate reply-to addresses already sent out in guest emails from a prior run.
        run: |
          printf '%s' "$EMAIL_REPLY_SECRET_STAGING" | npx wrangler secret put EMAIL_REPLY_SECRET --env staging
          printf '%s' "$EMAIL_INBOUND_SECRET_STAGING" | npx wrangler secret put EMAIL_INBOUND_SECRET --env staging
      - name: Sync staging preview secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Staging can be reseeded by overlapping pushes, so the secret must stay stable
        # across runs — regenerating it per run would invalidate draft preview tokens
        # issued by another run still in flight. Sourced from a fixed repo secret.
        run: |
          echo "${{ secrets.PREVIEW_SECRET_STAGING }}" | npx wrangler secret put PREVIEW_SECRET --env staging
      - name: Sync staging dev-route secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          E2E_DEV_ROUTE_SECRET_STAGING: ${{ secrets.E2E_DEV_ROUTE_SECRET_STAGING }}
        # Gates server/api/dev/* (see server/utils/dev-route-auth.ts) — must match the
        # header this job's own curl/Playwright calls send, so keep this in sync with
        # the E2E_DEV_ROUTE_SECRET env var above.
        run: |
          printf '%s' "$E2E_DEV_ROUTE_SECRET_STAGING" | npx wrangler secret put E2E_DEV_ROUTE_SECRET --env staging
      - run: npx playwright install --with-deps chromium
      - name: Warm up staging Worker and verify asset propagation
        run: |
          CURL_TIMEOUT=(--connect-timeout 5 --max-time 15)
          curl -sf "${CURL_TIMEOUT[@]}" -o /dev/null "https://staging.krabiclaw.com/" || true
          curl -sf "${CURL_TIMEOUT[@]}" -o /dev/null "https://staging.krabiclaw.com/blog" || true
          curl -sf "${CURL_TIMEOUT[@]}" -o /dev/null "https://staging.krabiclaw.com/api/billing/plans" || true
          curl -sf "${CURL_TIMEOUT[@]}" -L -H "x-dev-route-secret: ${E2E_DEV_ROUTE_SECRET}" -o /dev/null "https://staging.krabiclaw.com/api/dev/login" || true

          # See the matching comment in the "Warm up preview Worker" step (e2e-smoke
          # job) — same Cloudflare edge-propagation race, poll for the real asset
          # instead of guessing a fixed sleep duration.
          propagated=false
          stable_checks=0
          for i in $(seq 1 30); do
            tenant_html=$(curl -sf "${CURL_TIMEOUT[@]}" \
              -H "x-preview-tenant: demo" \
              -H "cache-control: no-store" \
              "https://staging.krabiclaw.com/?e2e=asset-probe-$i" || true)
            asset_path=$(printf '%s' "$tenant_html" | grep -oE '/_nuxt/entry\.[A-Za-z0-9_-]+\.css' | head -1)
            asset_result=""
            if [ -n "$asset_path" ]; then
              asset_result=$(curl -sI "${CURL_TIMEOUT[@]}" -o /dev/null -w "%{http_code} %{content_type}" \
                -H "x-preview-tenant: demo" \
                -H "cache-control: no-store" \
                "https://staging.krabiclaw.com${asset_path}" || true)
            fi
            if [[ "$asset_result" == "200 text/css"* ]]; then
              stable_checks=$((stable_checks + 1))
              echo "Asset $asset_path is live with CSS content (stable check $stable_checks/3, attempt $i)"
              if [ "$stable_checks" -ge 3 ]; then
                propagated=true
                break
              fi
            else
              stable_checks=0
              echo "Tenant entry asset is not stable yet (${asset_result:-no asset found}), retrying... (attempt $i)"
            fi
            sleep 2
          done
          if [ "$propagated" = false ]; then
            echo "::error::Staging tenant entry asset did not return 200 text/css for three consecutive checks."
            exit 1
          fi
      - name: Run required smoke and changed subsystem suites
        env:
          AUTH_CHANGED: ${{ needs.changes.outputs.auth }}
          DASHBOARD_CHANGED: ${{ needs.changes.outputs.dashboard }}
          BILLING_CHANGED: ${{ needs.changes.outputs.billing }}
          NOTIFICATIONS_CHANGED: ${{ needs.changes.outputs.notifications }}
          MCP_CHANGED: ${{ needs.changes.outputs.mcp }}
          SEO_CHANGED: ${{ needs.changes.outputs.seo }}
          POTTERY_HOUSE_CHANGED: ${{ needs.changes.outputs.pottery_house }}
          BLAWBY_CHANGED: ${{ needs.changes.outputs.blawby }}
        run: |
          yarn test:e2e:smoke
          [ "$AUTH_CHANGED" != "true" ] || yarn test:e2e:auth
          [ "$DASHBOARD_CHANGED" != "true" ] || yarn test:e2e:dashboard
          [ "$BILLING_CHANGED" != "true" ] || yarn test:e2e:billing
          [ "$NOTIFICATIONS_CHANGED" != "true" ] || PLAYWRIGHT_WORKERS=1 yarn test:e2e:notifications
          [ "$MCP_CHANGED" != "true" ] || PLAYWRIGHT_WORKERS=1 yarn test:e2e:mcp
          [ "$SEO_CHANGED" != "true" ] || yarn test:e2e:seo
          [ "$POTTERY_HOUSE_CHANGED" != "true" ] || PLAYWRIGHT_WORKERS=1 yarn test:e2e:pottery-house
          [ "$BLAWBY_CHANGED" != "true" ] || yarn test:e2e:blawby
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report-staging
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  prod-deploy:
    name: Deploy to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NUXT_PUBLIC_PLATFORM_DOMAIN: https://krabiclaw.com
      NUXT_PUBLIC_FREE_SITE_DOMAIN: https://krabiclaw.com
      NUXT_PUBLIC_APP_NAME: KrabiClaw

      BETTER_AUTH_URL: https://krabiclaw.com
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Build application
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: yarn build
      - name: Migrate + deploy production Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: |
          yarn migrate:prod
          yarn deploy:prod:worker
      - name: Sync production Discord webhook secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            printf '%s' "$DISCORD_WEBHOOK_URL" | npx wrangler secret put DISCORD_WEBHOOK_URL
          else
            echo "DISCORD_WEBHOOK_URL is not configured; signup Discord delivery will be recorded as failed."
          fi
      - name: Sync production Stripe secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          echo "$STRIPE_SECRET_KEY" | npx wrangler secret put STRIPE_SECRET_KEY
          echo "$STRIPE_WEBHOOK_SECRET" | npx wrangler secret put STRIPE_WEBHOOK_SECRET
      - name: Sync production AI Search secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLATFORM_SEARCH_REINDEX_SECRET: ${{ secrets.PLATFORM_SEARCH_REINDEX_SECRET }}
        # Authenticates POST /api/internal/search/reindex (server/api/internal/search/reindex.post.ts).
        run: |
          echo "$PLATFORM_SEARCH_REINDEX_SECRET" | npx wrangler secret put PLATFORM_SEARCH_REINDEX_SECRET
      - name: Check AI Search item count (diagnostic)
        continue-on-error: true
        env:
          PLATFORM_SEARCH_REINDEX_SECRET: ${{ secrets.PLATFORM_SEARCH_REINDEX_SECRET }}
        # Temporary: several prior reindex runs failed from a raw connection timeout
        # before ever reaching the delete-stale-items step, so orphaned items from
        # earlier key formats may have accumulated. This reports the current item
        # count/listing time without doing any uploads, so it's safe to fail without
        # blocking the deploy (continue-on-error) — purely informational.
        run: yarn ai-search:status:prod
      - name: Rebuild AI Search index (production)
        env:
          PLATFORM_SEARCH_REINDEX_SECRET: ${{ secrets.PLATFORM_SEARCH_REINDEX_SECRET }}
        # Migrations applied above can leave newly published platform docs/blog posts or tenant
        # blog posts unindexed — see docs/ai-search.md. No continue-on-error: a failed rebuild
        # must fail the deploy job loudly rather than silently leaving production search stale.
        run: yarn ai-search:sync --base-url https://krabiclaw.com

  prod-smoke:
    name: Production smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [prod-deploy]
    steps:
      - name: Check Pottery House + platform public routes
        shell: bash
        run: |
          set -euo pipefail
          pottery_hosts=("https://pottery-house.krabiclaw.com")
          pottery_routes=("/" "/experiences" "/experiences/pottery-wheel-class" "/about" "/contact")

          for host in "${pottery_hosts[@]}"; do
            echo "== ${host} =="
            for route in "${pottery_routes[@]}"; do
              url="${host}${route}"
              code=$(curl -L -s -o /tmp/page.html -w "%{http_code}" "${url}")
              title=$(grep -o '<title>.*</title>' /tmp/page.html | head -n1 | sed -E 's#</?title>##g' || true)
              echo "${route} -> ${code} | ${title:-<no-title>}"
              [[ "${code}" -lt 400 ]] || (echo "Route failed: ${url}" && exit 1)
            done
          done

          for url in "https://krabiclaw.com/" "https://krabiclaw.com/blog"; do
            code=$(curl -L -s -o /tmp/page.html -w "%{http_code}" "${url}")
            title=$(grep -o '<title>.*</title>' /tmp/page.html | head -n1 | sed -E 's#</?title>##g' || true)
            echo "${url} -> ${code} | ${title:-<no-title>}"
            [[ "${code}" -lt 400 ]] || (echo "Route failed: ${url}" && exit 1)
          done

  prod-auth-canary:
    name: Production auth canary
    # Disabled on every merge while dev velocity is high — sends a real WhatsApp/SMS OTP
    # per run, which adds up fast at merge frequency. Real-send coverage still runs daily
    # via prod-daily-canary. For on-demand real-send testing, use the separate
    # "Production Real-Send Canaries" workflow_dispatch workflow.
    if: vars.ENABLE_REAL_SEND_TESTS == 'true'
    runs-on: ubuntu-latest
    needs: [prod-smoke]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Run production auth canary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CANARY_BASE_URL: ${{ secrets.CANARY_BASE_URL }}
          CANARY_PHONE_E164: ${{ secrets.CANARY_PHONE_E164 }}
          CANARY_SITE_ID: ${{ secrets.CANARY_SITE_ID }}
          CANARY_ORG_ID: ${{ secrets.CANARY_ORG_ID }}
        run: |
          set -euo pipefail
          yarn canary:prod | tee canary-auth.log
      - name: Upload auth canary log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prod-auth-canary-log
          path: canary-auth.log
          if-no-files-found: ignore

  prod-notification-canary:
    name: Production notification canary
    # Disabled on every merge while dev velocity is high — sends a real email + real
    # WhatsApp message per run. Real-send coverage still runs daily via prod-daily-canary.
    # For on-demand real-send testing, use the separate "Production Real-Send
    # Canaries" workflow_dispatch workflow.
    if: vars.ENABLE_REAL_SEND_TESTS == 'true'
    runs-on: ubuntu-latest
    needs: [prod-auth-canary]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run production notification canary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CANARY_BASE_URL: ${{ secrets.CANARY_BASE_URL }}
          CANARY_SITE_ID: ${{ secrets.CANARY_SITE_ID }}
          CANARY_ORG_ID: ${{ secrets.CANARY_ORG_ID }}
          CANARY_NOTIFICATION_EMAIL: ${{ secrets.CANARY_NOTIFICATION_EMAIL }}
          CANARY_NOTIFICATION_PHONE_E164: ${{ secrets.CANARY_NOTIFICATION_PHONE_E164 }}
        run: |
          set -euo pipefail
          yarn canary:notifications 2>&1 | tee canary-notifications.log
      - name: Upload notification canary log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prod-notification-canary-log
          path: canary-notifications.log
          if-no-files-found: ignore

# ── Pottery House fixture ─────────────────────────────────────────────────────
# The fixture (yarn fixture:pottery-house) requires a running site — it cannot
# run in standard CI without a full dev server and seeded local D1.
#
# REQUIRED MANUAL CHECK before merging any PR that touches:
#   scripts/         (importer pipeline changes)
#   components/saya/ (theme copy changes)
#   utils/vertical-copy.ts
#   pages/           (routing changes)
#
# Run locally against your dev instance:
#   yarn fixture:pottery-house --url http://localhost:3000 --site-id site-pottery-house
#
# Against staging/preview (wildcard TLS only covers one subdomain level there,
# so the fixture sends x-preview-tenant automatically — just pass --slug too):
#   yarn fixture:pottery-house --url https://staging.krabiclaw.com --site-id site-pottery-house --slug pottery-house
#
# Or trigger the fixture.yml workflow against a preview deploy.
# See .github/workflows/fixture.yml
