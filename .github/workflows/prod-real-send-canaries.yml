name: Production Real-Send Canaries

on:
  workflow_dispatch:
    inputs:
      run_auth_canary:
        description: "Send a real production auth OTP canary"
        required: true
        type: boolean
        default: false
      run_notification_canary:
        description: "Send real production email + WhatsApp notification canaries"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prod-smoke:
    name: Production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Pottery House + platform public routes
        shell: bash
        run: |
          set -euo pipefail
          pottery_hosts=("https://pottery-house.krabiclaw.com")
          pottery_routes=("/" "/experiences" "/experiences/pottery-wheel-class" "/about" "/contact")

          for host in "${pottery_hosts[@]}"; do
            echo "== ${host} =="
            for route in "${pottery_routes[@]}"; do
              url="${host}${route}"
              code=$(curl -L --connect-timeout 10 --max-time 30 -s -o /tmp/page.html -w "%{http_code}" "${url}")
              title=$(grep -o '<title>.*</title>' /tmp/page.html | head -n1 | sed -E 's#</?title>##g' || true)
              echo "${route} -> ${code} | ${title:-<no-title>}"
              [[ "${code}" -lt 400 ]] || (echo "Route failed: ${url}" && exit 1)
            done
          done

          for url in "https://krabiclaw.com/" "https://krabiclaw.com/blog"; do
            code=$(curl -L --connect-timeout 10 --max-time 30 -s -o /tmp/page.html -w "%{http_code}" "${url}")
            title=$(grep -o '<title>.*</title>' /tmp/page.html | head -n1 | sed -E 's#</?title>##g' || true)
            echo "${url} -> ${code} | ${title:-<no-title>}"
            [[ "${code}" -lt 400 ]] || (echo "Route failed: ${url}" && exit 1)
          done

  prod-auth-canary:
    name: Production auth canary
    if: ${{ inputs.run_auth_canary }}
    runs-on: ubuntu-latest
    needs: [prod-smoke]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Run production auth canary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CANARY_BASE_URL: ${{ secrets.CANARY_BASE_URL }}
          CANARY_PHONE_E164: ${{ secrets.CANARY_PHONE_E164 }}
          CANARY_SITE_ID: ${{ secrets.CANARY_SITE_ID }}
          CANARY_ORG_ID: ${{ secrets.CANARY_ORG_ID }}
        run: |
          set -euo pipefail
          yarn canary:prod | tee canary-auth.log
      - name: Upload auth canary log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prod-auth-canary-log
          path: canary-auth.log
          if-no-files-found: ignore

  prod-notification-canary:
    name: Production notification canary
    if: ${{ inputs.run_notification_canary }}
    runs-on: ubuntu-latest
    needs: [prod-smoke]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run production notification canary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CANARY_BASE_URL: ${{ secrets.CANARY_BASE_URL }}
          CANARY_SITE_ID: ${{ secrets.CANARY_SITE_ID }}
          CANARY_ORG_ID: ${{ secrets.CANARY_ORG_ID }}
          CANARY_NOTIFICATION_EMAIL: ${{ secrets.CANARY_NOTIFICATION_EMAIL }}
          CANARY_NOTIFICATION_PHONE_E164: ${{ secrets.CANARY_NOTIFICATION_PHONE_E164 }}
        run: |
          set -euo pipefail
          yarn canary:notifications 2>&1 | tee canary-notifications.log
      - name: Upload notification canary log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prod-notification-canary-log
          path: canary-notifications.log
          if-no-files-found: ignore
